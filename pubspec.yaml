name: takos_corner_express
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  flutter_dotenv: ^6.0.0
  email_validator: ^3.0.0
  timeago: ^3.7.1
  loading_animation_widget: ^1.3.0
  jwt_decoder: ^2.0.1
  shimmer_animation: ^2.2.2
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.0.0
  google_nav_bar: ^5.0.7
  intl_phone_number_input: ^0.7.5
  country_phone_validator: ^1.0.2
  package_info_plus: ^10.1.0
  device_info_plus: ^13.2.0
  dotted_border: ^3.1.0
  http_parser: ^4.0.2
  solar_icons: ^0.1.0
  flutter_cache_manager: ^3.4.1
  cached_network_image: ^3.4.1

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo/logo.png"
  adaptive_icon_background: "assets/images/logo/ic_launcher_background.png"
  adaptive_icon_foreground: "assets/images/logo/ic_launcher_foreground.png"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/flags/
    - assets/images/logo/
    - .env
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/poppins/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/poppins/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/poppins/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/poppins/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/poppins/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/poppins/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/poppins/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/poppins/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/poppins/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/poppins/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/poppins/Poppins-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/poppins/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/poppins/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/poppins/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/poppins/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/poppins/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
    - family: Almarai
      fonts:
        - asset: assets/fonts/almarai/Almarai-Light.ttf
          weight: 300
        - asset: assets/fonts/almarai/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/almarai/Almarai-Bold.ttf
          weight: 700
        - asset: assets/fonts/almarai/Almarai-ExtraBold.ttf
          weight: 800